<style>
  /* ============================== CSS VARIABLES */
  :root {
    --green: #00ff88;
    --green-dim: #00cc6a;
    --green-dark: #003d1f;
    --green-glow: rgba(0,255,136,0.15);
    --black: #030a05;
    --black2: #0a0f0c;
    --black3: #111a14;
    --white: #f0fff6;
    --gray: #8a9e90;
    --font-display: 'Bebas Neue', Impact, sans-serif;
    --font-heading: 'Syne', system-ui, sans-serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --transition: 0.3s ease;
    --radius: 2px;
  }

  /* ============================== RESET & BASE */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    overflow-x: hidden;
    cursor: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeSpeed;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
  }

  a { text-decoration: none; color: inherit; }

  /* ============================== LOADING SCREEN */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--black);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  #loading.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .loading-logo {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--white);
  }
  .loading-logo span { color: var(--green); }
  .loading-bar-wrap {
    width: 160px;
    height: 2px;
    background: rgba(0,255,136,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    animation: loadBar 1s ease forwards;
  }
  @keyframes loadBar {
    from { width: 0; }
    to { width: 100%; }
  }

  /* ============================== CUSTOM CURSOR (desktop only) */
  .cursor {
    width: 12px;
    height: 12px;
    background: var(--green);
    border-radius: 50%;
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
    will-change: transform;
    transition: transform 0.08s ease;
  }
  .cursor-trail {
    width: 32px;
    height: 32px;
    border: 1px solid var(--green);
    border-radius: 50%;
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    opacity: 0.4;
    will-change: transform;
    transition: transform 0.18s ease, opacity 0.3s;
  }
  .cursor.hover { transform: translate(-50%, -50%) scale(2.5); }
  .cursor-trail.hover { opacity: 0.15; }

  /* ============================== NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
  }

  /* ============================== SCROLLBAR */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--black2); }
  ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 2px; }

  /* ============================== SKIP LINK (accessibility) */
  .skip-link {
    position: absolute;
    top: -100%;
    left: 0;
    background: var(--green);
    color: var(--black);
    padding: 8px 16px;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 14px;
    z-index: 99999;
    border-radius: 0 0 4px 0;
    transition: top 0.2s;
  }
  .skip-link:focus { top: 0; }

  /* ============================== HEADER */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    padding: 20px 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.4s ease;
    will-change: padding, background;
  }
  header.scrolled {
    background: rgba(3,10,5,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,255,136,0.08);
    padding: 14px 5%;
  }

  .logo {
    font-family: var(--font-display);
    font-size: clamp(18px, 3vw, 26px);
    letter-spacing: 3px;
    color: var(--white);
    text-decoration: none;
    white-space: nowrap;
  }
  .logo span { color: var(--green); }

  .header-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green);
    color: var(--black);
    text-decoration: none;
    padding: 10px 22px;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    border-radius: var(--radius);
    transition: all var(--transition);
    white-space: nowrap;
    border: none;
    cursor: pointer;
  }
  .header-cta:hover,
  .header-cta:focus-visible {
    background: var(--white);
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(0,255,136,0.3);
    outline: none;
  }
  .header-cta svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    fill: currentColor;
  }

  /* ============================== HERO */
  .hero {
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    align-items: center;
    position: relative;
    padding: 120px 5% 80px;
    overflow: hidden;
  }

  .hero-grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    pointer-events: none;
  }

  .hero-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    will-change: opacity;
  }
  .hero-orb-1 {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,255,136,0.12) 0%, transparent 70%);
    top: -100px;
    right: -100px;
  }
  .hero-orb-2 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,200,100,0.08) 0%, transparent 70%);
    bottom: 0;
    left: -100px;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 700px;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(0,255,136,0.3);
    background: rgba(0,255,136,0.05);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 11px;
    font-family: var(--font-heading);
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }
  .hero-tag-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(44px, 9vw, 110px);
    line-height: 0.9;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.4s forwards;
  }
  .hero-title .highlight {
    color: var(--green);
    text-shadow: 0 0 40px rgba(0,255,136,0.5), 0 0 80px rgba(0,255,136,0.2);
  }

  .hero-sub {
    font-size: clamp(15px, 2vw, 18px);
    color: var(--gray);
    line-height: 1.7;
    max-width: 520px;
    margin-bottom: 44px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.6s forwards;
  }

  .hero-btns {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.8s forwards;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--green);
    color: var(--black);
    text-decoration: none;
    padding: 16px 32px;
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 1px;
    border-radius: var(--radius);
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
    border: none;
    cursor: pointer;
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity var(--transition);
  }
  .btn-primary:hover,
  .btn-primary:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,255,136,0.4);
    outline: none;
  }
  .btn-primary:hover::before { opacity: 1; }
  .btn-primary svg { width: 18px; height: 18px; flex-shrink: 0; fill: currentColor; }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--white);
    text-decoration: none;
    padding: 16px 32px;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius);
    transition: all var(--transition);
    cursor: pointer;
  }
  .btn-secondary:hover,
  .btn-secondary:focus-visible {
    border-color: var(--green);
    color: var(--green);
    transform: translateY(-2px);
    outline: none;
  }

  /* ============================== HERO MOCKUP */
  .hero-mockup {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 55%;
    max-width: 700px;
    opacity: 0;
    animation: fadeLeft 1s ease 1s forwards;
    pointer-events: none;
    will-change: opacity, transform;
  }

  .mockup-screen {
    width: 100%;
    background: var(--black3);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,255,136,0.08),
      0 40px 100px rgba(0,0,0,0.8),
      0 0 80px rgba(0,255,136,0.05);
  }
  .mockup-bar {
    background: rgba(0,255,136,0.06);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(0,255,136,0.08);
  }
  .mockup-dot { width: 10px; height: 10px; border-radius: 50%; }
  .mockup-dot:nth-child(1) { background: #ff5f57; }
  .mockup-dot:nth-child(2) { background: #febc2e; }
  .mockup-dot:nth-child(3) { background: #28c840; }
  .mockup-url {
    flex: 1;
    background: rgba(0,0,0,0.3);
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--gray);
    font-family: var(--font-body);
  }
  .mockup-body { padding: 24px; }
  .mockup-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .mockup-logo-fake {
    height: 8px;
    width: 80px;
    background: linear-gradient(90deg, var(--green), var(--green-dim));
    border-radius: 4px;
  }
  .mockup-nav-links { display: flex; gap: 12px; }
  .mockup-nav-link { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); }
  .mockup-hero-area {
    background: linear-gradient(135deg, rgba(0,255,136,0.06), rgba(0,0,0,0.3));
    border: 1px solid rgba(0,255,136,0.1);
    border-radius: 8px;
    padding: 32px 24px;
    margin-bottom: 16px;
  }
  .mockup-headline { height: 16px; width: 70%; background: rgba(255,255,255,0.15); border-radius: 4px; margin-bottom: 8px; }
  .mockup-headline-2 { height: 16px; width: 50%; background: rgba(255,255,255,0.08); border-radius: 4px; margin-bottom: 20px; }
  .mockup-cta-fake { height: 32px; width: 120px; background: var(--green); border-radius: 4px; opacity: 0.8; }
  .mockup-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .mockup-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 12px;
  }
  .mockup-card-icon { width: 20px; height: 20px; background: rgba(0,255,136,0.2); border-radius: 4px; margin-bottom: 8px; }
  .mockup-card-line { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.08); margin-bottom: 4px; }
  .mockup-card-line.short { width: 60%; }

  /* ============================== HERO STATS */
  .hero-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    margin-top: 56px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.2s forwards;
  }
  .stat { border-left: 2px solid var(--green); padding-left: 16px; }
  .stat-num {
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 40px);
    color: var(--green);
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ============================== SCROLL INDICATOR */
  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeIn 1s ease 2s forwards;
    cursor: pointer;
    background: none;
    border: none;
    color: var(--gray);
    padding: 8px;
  }
  .scroll-indicator span {
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: var(--font-body);
  }
  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--green), transparent);
    animation: scrollLine 2s ease-in-out infinite;
  }

  /* ============================== SECTION BASE */
  section { position: relative; z-index: 2; }

  .section-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-heading);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 20px;
  }
  .section-tag::before {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--green);
    flex-shrink: 0;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(32px, 6vw, 72px);
    line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }
  .section-title .g { color: var(--green); }

  .section-sub {
    font-size: 16px;
    color: var(--gray);
    line-height: 1.7;
    max-width: 540px;
  }

  /* ============================== DOR SECTION */
  .dor-section {
    padding: 120px 5%;
    background: var(--black2);
    border-top: 1px solid rgba(0,255,136,0.05);
  }
  .dor-header { max-width: 600px; margin-bottom: 64px; }

  .dor-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2px;
  }

  .dor-card {
    background: var(--black3);
    border: 1px solid rgba(0,255,136,0.08);
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
    transition: border-color var(--transition), transform var(--transition);
    cursor: default;
  }
  .dor-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--green);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }
  .dor-card:hover { border-color: rgba(0,255,136,0.2); transform: translateY(-4px); }
  .dor-card:hover::before { transform: scaleX(1); }
  .dor-card:hover .dor-icon { filter: drop-shadow(0 0 10px rgba(0,255,136,0.5)); }

  .dor-icon {
    font-size: 36px;
    margin-bottom: 20px;
    transition: filter var(--transition);
    display: block;
    line-height: 1;
  }
  .dor-card-title {
    font-family: var(--font-heading);
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 16px;
  }
  .dor-card-list { list-style: none; }
  .dor-card-list li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    color: var(--gray);
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    line-height: 1.5;
  }
  .dor-card-list li:last-child { border-bottom: none; }
  .dor-card-list li::before {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 700;
    margin-top: 2px;
