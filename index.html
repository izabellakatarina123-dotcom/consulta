<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliente Web Sites</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:#050505;
color:#fff;
overflow-x:hidden;
}

:root{
--green:#00ff88;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,255,136,.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,136,.05) 1px, transparent 1px);
background-size:50px 50px;
z-index:-2;
animation:gridDrift 25s linear infinite;
}

@keyframes gridDrift{
0%{transform:translateY(0);}
100%{transform:translateY(50px);}
}

.container{
width:min(1200px,90%);
margin:auto;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
background:rgba(0,0,0,.4);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,.05);
}

.nav-wrap{
height:85px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:14px;
}

.logo-box{
width:48px;
height:48px;
background:var(--green);
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
color:#000;
font-weight:900;
font-size:22px;
}

.logo h2{
font-family:'Bebas Neue';
font-size:34px;
letter-spacing:2px;
}

.btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:18px 30px;
background:var(--green);
color:#000;
font-weight:800;
text-decoration:none;
border-radius:14px;
transition:.3s;
box-shadow:0 0 25px rgba(0,255,136,.3);
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 0 35px rgba(0,255,136,.5);
}

.hero{
min-height:100vh;
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
gap:70px;
padding-top:120px;
position:relative;
}

.hero-orb{
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,var(--green) 0%, transparent 70%);
opacity:.12;
top:-200px;
right:-200px;
filter:blur(60px);
}

.badge{

padding:10px 18px;
border:1px solid rgba(0,255
